en:
  - title: "Portfolio Platform"
    type: "Personal product"
    summary: "A bilingual GitHub Pages portfolio built as a lightweight content system instead of a static one-off page."
    problem: "The previous site did not communicate engineering focus, project depth, or search intent clearly."
    role: "Designed the information architecture, content model, UI system, and SEO foundation."
    decisions:
      - "Kept GitHub Pages and Jekyll for fast hosting with minimal operational overhead."
      - "Moved editable content into YAML so links, projects, skills, and copy can be updated without touching layouts."
      - "Built language-specific routes and metadata for English and Turkish discovery."
    outcome: "A maintainable portfolio foundation that can grow with real case studies, CV updates, and technical writing."
    technologies: ["Jekyll", "Liquid", "HTML", "CSS", "SEO"]
    github: ""
    live: "https://ferhatacar.github.io"
  - title: "Task Manager API"
    type: "Backend case study"
    summary: "An API-first productivity service designed around clean resource boundaries, validation, and predictable persistence."
    problem: "Task workflows need simple interfaces, reliable state changes, and data models that remain easy to evolve."
    role: "Modeled the API surface, persistence flow, and service boundaries."
    decisions:
      - "Separated request validation, business rules, and data access concerns."
      - "Used explicit status transitions to keep workflow behavior understandable."
      - "Prepared the structure for automated tests and CI checks."
    outcome: "A backend reference project that demonstrates practical API design and maintainable .NET architecture."
    technologies: [".NET", "ASP.NET Core", "Entity Framework", "SQL", "REST"]
    github: ""
    live: ""
  - title: "E-Commerce Flow"
    type: "Full-stack case study"
    summary: "A product browsing and order flow concept connecting React UI patterns with backend data and checkout boundaries."
    problem: "Commerce interfaces need fast discovery, clear state, and backend contracts that keep the frontend simple."
    role: "Planned the user flow, component structure, API needs, and data ownership."
    decisions:
      - "Separated catalog, basket, and order concerns to avoid tightly coupled UI state."
      - "Kept reusable UI sections focused on product decisions instead of decoration."
      - "Defined integration points for authentication, payment, and order history."
    outcome: "A full-stack portfolio case study ready to be connected to a real repository and live demo."
    technologies: ["React", "Node.js", "MongoDB", "API Design", "UX Flow"]
    github: ""
    live: ""
tr:
  - title: "Portfolyo Platformu"
    type: "Kişisel ürün"
    summary: "Tek seferlik statik sayfa yerine hafif bir içerik sistemi gibi tasarlanmış, iki dilli GitHub Pages portfolyosu."
    problem: "Önceki site mühendislik odağını, proje derinliğini ve arama niyetini yeterince net anlatmıyordu."
    role: "Bilgi mimarisi, içerik modeli, arayüz sistemi ve SEO temelini tasarlama."
    decisions:
      - "Hızlı ve düşük bakım maliyetli yayın için GitHub Pages ve Jekyll korundu."
      - "Linkler, projeler, yetenekler ve metinler layout dosyalarına dokunmadan güncellenebilsin diye YAML'a taşındı."
      - "İngilizce ve Türkçe görünürlük için dil bazlı rotalar ve metadata hazırlandı."
    outcome: "Gerçek case study'ler, CV güncellemeleri ve teknik yazılarla büyüyebilecek sürdürülebilir bir portfolyo temeli."
    technologies: ["Jekyll", "Liquid", "HTML", "CSS", "SEO"]
    github: ""
    live: "https://ferhatacar.github.io"
  - title: "Task Manager API"
    type: "Backend case study"
    summary: "Net kaynak sınırları, validasyon ve öngörülebilir veri akışı üzerine tasarlanmış API odaklı üretkenlik servisi."
    problem: "Görev akışları sade arayüzlere, güvenilir durum değişimlerine ve kolay evrilen veri modellerine ihtiyaç duyar."
    role: "API yüzeyi, kalıcılık akışı ve servis sınırlarını modelleme."
    decisions:
      - "İstek validasyonu, iş kuralları ve veri erişimi sorumlulukları ayrıldı."
      - "Akış davranışı anlaşılır kalsın diye durum geçişleri açık hale getirildi."
      - "Otomatik test ve CI kontrolleri için yapı hazırlandı."
    outcome: "Pratik API tasarımını ve sürdürülebilir .NET mimarisini gösteren backend referans projesi."
    technologies: [".NET", "ASP.NET Core", "Entity Framework", "SQL", "REST"]
    github: ""
    live: ""
  - title: "E-Ticaret Akışı"
    type: "Full-stack case study"
    summary: "React arayüz kalıplarını backend veri ve sipariş sınırlarıyla bağlayan ürün keşfi ve sipariş akışı konsepti."
    problem: "E-ticaret arayüzleri hızlı keşif, net durum yönetimi ve frontend'i sade tutan backend sözleşmeleri ister."
    role: "Kullanıcı akışı, component yapısı, API ihtiyaçları ve veri sahipliğini planlama."
    decisions:
      - "Catalog, sepet ve sipariş sorumlulukları ayrılarak UI state karmaşası azaltıldı."
      - "Yeniden kullanılabilir arayüz bölümleri dekorasyon yerine ürün kararlarına odaklandı."
      - "Kimlik doğrulama, ödeme ve sipariş geçmişi için entegrasyon noktaları tanımlandı."
    outcome: "Gerçek repo ve live demo ile bağlanmaya hazır full-stack portfolyo case study'si."
    technologies: ["React", "Node.js", "MongoDB", "API Design", "UX Flow"]
    github: ""
    live: ""
