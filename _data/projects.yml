en:
  - title: "Portfolio Platform"
    type: "Personal product"
    summary: "A bilingual GitHub Pages portfolio designed as a maintainable content platform rather than a one-off static page."
    problem: "The previous site did not communicate engineering depth, technical writing, or search intent clearly enough."
    role: "Designed the information architecture, content model, UI system, bilingual routing, and SEO foundation."
    decisions:
      - "Kept GitHub Pages and Jekyll for fast publishing with minimal operational overhead."
      - "Moved reusable content into YAML so profile, projects, skills, and navigation can evolve without layout rewrites."
      - "Built language-aware routes and metadata for English and Turkish discovery."
    outcome: "A portfolio foundation that can scale with case studies, CV updates, and a growing technical blog."
    technologies: ["Jekyll", "Liquid", "HTML", "CSS", "SEO"]
    github: ""
    live: "https://ferhatacar.github.io"
  - title: "Chronicler"
    type: "AI journaling app"
    summary: "A Flutter-based journal app that turns two daily answers into a warm, editable first-person story."
    problem: "Most journaling apps start from a blank page, which makes daily reflection harder to sustain."
    role: "Designed and built the mobile app, Firebase backend, subscription flow, policy pages, and Google Play release foundation."
    decisions:
      - "Used Flutter and Firebase to ship a focused cross-platform journaling workflow with authentication and cloud storage."
      - "Kept saved entries readable, editable, exportable, and deletable even when Premium access changes."
      - "Added backend AI generation, rewarded ad regeneration, subscriptions, analytics, and public policy/support pages for launch readiness."
    outcome: "A Play-ready mobile product foundation with daily prompts, AI story drafts, archive, sharing, reminders, account deletion, and monetization hooks."
    technologies: ["Flutter", "Firebase", "Cloud Functions", "Firestore", "Google Play"]
    github: "https://github.com/FerhatACAR/Chronicler"
    live: "/chronicler/"
  - title: "Task Manager API"
    type: "Backend case study"
    summary: "An API-first productivity service focused on clean resource boundaries, validation, and predictable persistence."
    problem: "Task workflows need reliable state transitions, clear contracts, and data models that stay easy to evolve."
    role: "Modeled the API surface, persistence flow, and service boundaries."
    decisions:
      - "Separated validation, business rules, and data access concerns."
      - "Used explicit workflow transitions to keep application behavior understandable."
      - "Prepared the structure for automated tests and CI-friendly delivery."
    outcome: "A backend reference project that demonstrates practical .NET architecture and maintainable API design."
    technologies: [".NET", "ASP.NET Core", "Entity Framework", "SQL", "REST"]
    github: ""
    live: ""
  - title: "E-Commerce Flow"
    type: "Full-stack case study"
    summary: "A product discovery and ordering flow concept connecting React UI patterns with backend data and transaction boundaries."
    problem: "Commerce interfaces need fast discovery, clear UI state, and backend contracts that keep frontend complexity under control."
    role: "Planned user flows, component structure, API needs, and ownership boundaries."
    decisions:
      - "Separated catalog, basket, and order concerns to avoid tightly coupled state."
      - "Kept reusable UI sections focused on decision support rather than decoration."
      - "Defined extension points for authentication, payments, and order history."
    outcome: "A full-stack case study ready to be connected to a repository, demo, and richer product narrative."
    technologies: ["React", "Node.js", "MongoDB", "API Design", "UX Flow"]
    github: ""
    live: ""
tr:
  - title: "Portfolyo Platformu"
    type: "Kişisel ürün"
    summary: "Tek seferlik statik sayfa yerine sürdürülebilir bir içerik platformu gibi tasarlanmış iki dilli GitHub Pages portfolyosu."
    problem: "Önceki site mühendislik derinliğini, teknik yazıları ve arama niyetini yeterince net göstermiyordu."
    role: "Bilgi mimarisi, içerik modeli, arayüz sistemi, iki dilli yönlendirme ve SEO temelini tasarlama."
    decisions:
      - "Hızlı yayın ve düşük operasyon yükü için GitHub Pages ve Jekyll tercih edildi."
      - "Profil, projeler, yetenekler ve navigasyonun layout değiştirmeden evrilebilmesi için içerik YAML'a taşındı."
      - "İngilizce ve Türkçe görünürlük için dil duyarlı rotalar ve metadata kuruldu."
    outcome: "Case study'ler, CV güncellemeleri ve büyüyen teknik blog ile ölçeklenebilecek bir portfolyo temeli."
    technologies: ["Jekyll", "Liquid", "HTML", "CSS", "SEO"]
    github: ""
    live: "https://ferhatacar.github.io"
  - title: "Chronicler"
    type: "AI günlük uygulaması"
    summary: "İki günlük cevabı sıcak, düzenlenebilir birinci şahıs hikayesine dönüştüren Flutter tabanlı günlük uygulaması."
    problem: "Çoğu günlük uygulaması boş sayfayla başlar; bu da günlük yazma alışkanlığını sürdürmeyi zorlaştırır."
    role: "Mobil uygulamayı, Firebase backend akışını, abonelik temelini, politika sayfalarını ve Google Play yayın hazırlığını tasarlama ve geliştirme."
    decisions:
      - "Flutter ve Firebase ile kimlik doğrulama, bulut kayıt ve günlük yazma akışını tek ürün içinde topladım."
      - "Premium durumu değişse bile kayıtlı içeriklerin okunabilir, düzenlenebilir, dışa aktarılabilir ve silinebilir kalmasını sağladım."
      - "Yayına hazırlık için backend AI üretimi, ödüllü reklamla yeniden yazma, abonelik, analiz ve public policy/support sayfaları ekledim."
    outcome: "Günlük sorular, AI hikaye taslakları, arşiv, paylaşım, hatırlatıcılar, hesap silme ve monetizasyon altyapısı olan Play-ready mobil ürün temeli."
    technologies: ["Flutter", "Firebase", "Cloud Functions", "Firestore", "Google Play"]
    github: "https://github.com/FerhatACAR/Chronicler"
    live: "/chronicler/"
  - title: "Task Manager API"
    type: "Backend vaka çalışması"
    summary: "Temiz kaynak sınırları, doğrulama ve öngörülebilir veri akışı üzerine kurulu API odaklı üretkenlik servisi."
    problem: "Görev akışları güvenilir durum geçişlerine, net sözleşmelere ve kolay evrilen veri modellerine ihtiyaç duyar."
    role: "API yüzeyi, kalıcılık akışı ve servis sınırlarını modelleme."
    decisions:
      - "Doğrulama, iş kuralları ve veri erişimi sorumlulukları ayrıldı."
      - "Uygulama davranışını anlaşılır tutmak için açık iş akışı geçişleri kullanıldı."
      - "Otomatik testler ve CI uyumlu teslim için yapı hazırlandı."
    outcome: "Pratik .NET mimarisini ve sürdürülebilir API tasarımını gösteren bir backend referans projesi."
    technologies: [".NET", "ASP.NET Core", "Entity Framework", "SQL", "REST"]
    github: ""
    live: ""
  - title: "E-Ticaret Akışı"
    type: "Full-stack vaka çalışması"
    summary: "React arayüz kalıplarını backend veri ve işlem sınırlarıyla bağlayan ürün keşfi ve sipariş akışı konsepti."
    problem: "E-ticaret arayüzleri hızlı keşif, net UI state yönetimi ve frontend karmaşıklığını kontrol altında tutan backend sözleşmeleri ister."
    role: "Kullanıcı akışları, component yapısı, API ihtiyaçları ve sahiplik sınırlarını planlama."
    decisions:
      - "Catalog, sepet ve sipariş sorumlulukları ayrılarak sıkı bağlı state yapısı önlendi."
      - "Yeniden kullanılabilir arayüz bölümleri dekorasyon yerine karar desteğine odaklandı."
      - "Kimlik doğrulama, ödeme ve sipariş geçmişi için genişleme noktaları tanımlandı."
    outcome: "Repo, demo ve daha zengin ürün anlatımıyla güçlendirilmeye hazır bir full-stack vaka çalışması."
    technologies: ["React", "Node.js", "MongoDB", "API Design", "UX Flow"]
    github: ""
    live: ""
