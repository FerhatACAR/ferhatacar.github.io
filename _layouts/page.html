---
layout: default
---
<section class="page-hero section-band">
  <div class="site-shell">
    <p class="eyebrow">{{ page.kicker }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
  </div>
</section>
<section class="section-band">
  <div class="site-shell rich-text">
    {{ content }}
  </div>
</section>
