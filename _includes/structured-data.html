{% assign lang = include.lang | default: site.lang | default: "en" %}
{% assign profile = site.data.profile[lang] %}
{% if page.layout == "post" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "datePublished": {{ page.date | date_to_xmlschema | jsonify }},
  "dateModified": {{ page.date | date_to_xmlschema | jsonify }},
  "inLanguage": {{ lang | jsonify }},
  "mainEntityOfPage": {{ page.url | absolute_url | jsonify }},
  "image": {{ page.image | default: site.image | default: "/assets/images/og-image.png" | absolute_url | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ profile.name | jsonify }},
    "url": {{ site.url | jsonify }}
  },
  "publisher": {
    "@type": "Person",
    "name": {{ profile.name | jsonify }},
    "url": {{ site.url | jsonify }}
  },
  "keywords": {{ page.keywords | default: page.tags | jsonify }}
}
</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": {{ profile.name | jsonify }},
  "jobTitle": {{ profile.role | jsonify }},
  "email": {{ profile.email | prepend: "mailto:" | jsonify }},
  "url": {{ site.url | jsonify }},
  "image": {{ profile.photo | absolute_url | jsonify }},
  "address": {
    "@type": "PostalAddress",
    "addressCountry": {{ profile.location | jsonify }}
  },
  "sameAs": {{ site.social.links | jsonify }}
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.title | jsonify }},
  "url": {{ site.url | jsonify }},
  "inLanguage": {{ lang | jsonify }},
  "description": {{ site.description | jsonify }}
}
</script>
{% endif %}
